services:
  gateway:
    build: ./gateway
    container_name: drawing-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - REPLICA_1=http://replica1:4001
      - REPLICA_2=http://replica2:4002
      - REPLICA_3=http://replica3:4003
    depends_on:
      - replica1
      - replica2
      - replica3
    networks:
      - raft_network
    volumes:
      - ./gateway:/app
    command: npm run dev

  replica1:
    build: ./replica1
    container_name: drawing-replica1
    environment:
      - NODE_ENV=development
      - REPLICA_ID=replica1
      - PORT=4001
      - PEERS=replica2:4002,replica3:4003
      - ELECTION_TIMEOUT_MIN=500
      - ELECTION_TIMEOUT_MAX=800
      - HEARTBEAT_INTERVAL=150
    ports:
      - "4001:4001"
    networks:
      - raft_network
    volumes:
      - ./replica1:/app
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  replica2:
    build: ./replica2
    container_name: drawing-replica2
    environment:
      - NODE_ENV=development
      - REPLICA_ID=replica2
      - PORT=4002
      - PEERS=replica1:4001,replica3:4003
      - ELECTION_TIMEOUT_MIN=500
      - ELECTION_TIMEOUT_MAX=800
      - HEARTBEAT_INTERVAL=150
    ports:
      - "4002:4002"
    networks:
      - raft_network
    volumes:
      - ./replica2:/app
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  replica3:
    build: ./replica3
    container_name: drawing-replica3
    environment:
      - NODE_ENV=development
      - REPLICA_ID=replica3
      - PORT=4003
      - PEERS=replica1:4001,replica2:4002
      - ELECTION_TIMEOUT_MIN=500
      - ELECTION_TIMEOUT_MAX=800
      - HEARTBEAT_INTERVAL=150
    ports:
      - "4003:4003"
    networks:
      - raft_network
    volumes:
      - ./replica3:/app
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4003/health"]
      interval: 5s
      timeout: 3s
      retries: 3

networks:
  raft_network:
    driver: bridge
